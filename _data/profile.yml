short_bio: >-
  <p>
    I am a Computer Science PhD student at <a href="https://www.lsu.edu/" target="_blank">Louisiana State University</a>,
    advised by <a href="https://www.lsu.edu/eng/cse/people/faculty/anaraky.php" target="_blank">Dr. Reza Anaraky</a> in the ACT Lab.
    My research lies at the intersection of <strong>Human-Computer Interaction (HCI)</strong>,
    <strong>Human-AI Interaction</strong>, and <strong>privacy</strong>, with a current focus on
    quantifying the cognitive burden of UI dark patterns on older adults using EEG.
  </p>
  <p>
    Previously, I was an R&D Software Engineer at
    <a href="https://frontiersemi.com/" target="_blank">Frontier Semiconductor</a> (Milpitas, CA),
    where I built CUDA-accelerated metrology software shipped to TSMC, Intel, SK Hynix, and Texas Instruments.
    I earned my B.Sc. in CSE from the
    <a href="https://mist.ac.bd/" target="_blank">Military Institute of Science and Technology (MIST)</a> in Bangladesh.
  </p>
  <p>
    <strong>I am actively looking for Summer 2026 internship opportunities.</strong>
  </p>

